<body>

    <!-- SIDEBAR -->

        <h1 class="logo">
           MovieBlast

        <input type="text" placeholder="Search movie...." class="search">

        <ul class="menu">

             Home
            </li>

               Trending
            </li>
            <li>
               Explore
            </li>
            <li>
               Favourite
            </li>
        </ul>
    </div>

    <!-- RIGHT CONTENT -->
    <div class="main">
        <img src="/Task_1_2_3/images/home-whistle_poster.jpg"class="banner">
<!--Popular movies-->
     <div class="popular-movies">
  <h2>Popular Movies</h2>
  <div class="movies">
    <div class="movie-card">
      <img src="/Task_1_2_3/images/pushpa_popularimages.jpg">
    </div>
    <div class="movie-card">
      <img src="/Task_1_2_3/images/Andhra-King-Taluka_popularimages.jpg">
    </div>

    <div class="movie-card">
      <img src="/Task_1_2_3/images/kantara_popularimages.jpg">
    </div>
    <div class="movie-card">
      <img src="/Task_1_2_3/images/mirai_popularimages.webp">
    </div>
 </div>
 <!--Popular series-->
 <div class="popular-series">
  <h2>Popular Series</h2>
  <div class="series">
    <div class="series-card">
      <img src="/Task_1_2_3/images/sqid-game_series.jpg">

    </div>
 </div>
 <!--fill the given form for download any movie-->
 <h2>fill the given form for download any movie</h2>

<form class="center-form">
  <label>Username:</label>
  <input type="text" placeholder="Username">

  <label>Email:</label>
  <input type="text" placeholder="Email">

  <label>Password:</label>
  <input type="password" placeholder="password">

  <label>Mobile:</label>
  <input type="number" placeholder="number">

  <label>Movie name:</label>
  <input type="text" placeholder="movie name">

  <label>Enter OTP:</label>
  <input type="number" placeholder="otp">

  <label>Review:</label>
  <input type="text" placeholder="review">

  <input type="button" value="Download" onclick="downloadMovie()">
  <input type="button" value="Submit" onclick="submitform()">
  <input type="button" value="Download Form" onclick="downloadForm()">
</form>
<script src="website.js"></script>
</body>
</html>
